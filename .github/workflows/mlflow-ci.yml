- name: Check Docker Hub secrets
  env:
    DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  run: |
    if [ -z "$DOCKERHUB_USERNAME" ]; then
      echo "DOCKERHUB_USERNAME kosong atau belum dibuat di GitHub Secrets."
      exit 1
    fi

    if [ -z "$DOCKERHUB_TOKEN" ]; then
      echo "DOCKERHUB_TOKEN kosong atau belum dibuat di GitHub Secrets."
      exit 1
    fi

    echo "Docker Hub secrets terdeteksi."

- name: Login to Docker Hub
  uses: docker/login-action@v4
  with:
    username: ${{ secrets.DOCKERHUB_USERNAME }}
    password: ${{ secrets.DOCKERHUB_TOKEN }}

- name: Build Docker image with MLflow
  env:
    MLFLOW_DISABLE_ENV_CREATION: "true"
  run: |
    RUN_ID=$(cat MLProject/outputs/run_id.txt)
    echo "Building Docker image for run: ${RUN_ID}"

    mlflow models build-docker \
      --env-manager=local \
      -m "runs:/${RUN_ID}/model" \
      -n "${DOCKER_IMAGE_NAME}"

- name: Push Docker image to Docker Hub
  run: |
    docker push "${DOCKER_IMAGE_NAME}"